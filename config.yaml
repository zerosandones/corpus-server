server:
  host: "0.0.0.0"
  port: 3000

storage:
  root: "./storage"
  assetsDir: "_assets"

database:
  type: "in-memory"
  path: ":memory:"

auth:
  type: "static"
  jwtSecret: "change-me-in-production"
  tokens:
    - token: "dev_token_admin"
      sub: "admin@example.com"
      type: "human"
      roles: ["admin", "engineering"]
