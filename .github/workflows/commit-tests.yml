name: Test

on:
  push:
  pull_request:

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest
    permissions:
      checks: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Run tests
        run: bun test --reporter=junit --reporter-outfile=results.xml

      - name: Publish test results
        uses: dorny/test-reporter@v3
        if: always()
        with:
          name: Bun Tests
          path: results.xml
          reporter: jest-junit